<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Task Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <header class="site-header">
        <h1>📚 Study Task Tracker</h1> 
        <select id="themeSwitcher" class="theme-dropdown">
            <option value="light">🌞 Light</option>
            <option value="dark">🌙 Dark</option>
            <option value="blue">🩵 Blue</option>
            <option value="pastel">🎀 Pastel</option>
        </select>
    </header>

    <main class="container" id="main-content">
        <!-- 1. Input Section -->
        <section class="input-section">
            <form id="taskForm" onsubmit="event.preventDefault(); addTask();">
                <input type="text" id="taskInput" placeholder="What are you studying?" aria-label="Task description">
                <div class="controls">
                    <select id="categoryInput" aria-label="Task category">
                        <option value="Theory">📘 Theory</option>
                        <option value="Practical">💻 Practical</option>
                        <option value="Revision">🔄 Revision</option>
                        <option value="Assignment">📝 Assignment</option>
                    </select>
                    <button type="submit" id="addBtn">Add Task</button>
                </div>
            </form>
            <p id="errorMsg" class="error" role="alert"></p>
        </section>

        <!-- 2. Search & Controls Section -->
        <section class="filter-search-section">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="🔍 Search tasks...">
            </div>
            
            <div class="control-groups">
                <div class="filter-buttons" id="filterButtons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                    <button class="filter-btn" data-filter="Theory">Theory</button>
                    <button class="filter-btn" data-filter="Practical">Practical</button>
                    <button class="filter-btn" data-filter="Revision">Revision</button>
                    <button class="filter-btn" data-filter="Assignment">Assignment</button>
                </div>

                <div class="sort-controls">
                    <button onclick="sortTasks('asc')">A to Z</button>
                    <button onclick="sortTasks('desc')">Z to A</button>
                </div>
            </div>
        </section>

        <!-- 3. Task List & Stats -->
        <div id="taskStats" class="task-stats"></div>
        <div id="emptyState" class="empty-state" style="display: none;">No tasks found.</div>
        
        <ul id="taskList" aria-live="polite" aria-label="Task list"></ul>

        <!-- 4. Celebration View -->
        <div id="celebration" class="celebration hidden">
            <img src="task completed image.jpg" alt="Celebration" />
            <p>All tasks completed! 🎉</p>
        </div>
    </main>

    <footer class="site-footer">
        <nav aria-label="Footer navigation">
            <a href="#taskInput">Add task</a>
            <a href="#taskList">View tasks</a>
            <a href="#main-content">Back to top</a>
            <a href="privacy.html">Privacy Policy</a>
        </nav>
        <p>&copy; 2026 Study Task Tracker</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
